<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Terminal 🎉</title>
<style>
body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: #000;
    color: #00ff00;

    display: flex;
    justify-content: center;
    align-items: flex-start; 

    min-height: 100vh;
    overflow-y: auto;
    padding: 20px 10px; 
}
#bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
    pointer-events: none; 
}
.column {
    position: absolute;
    top: 100%;
    width: 1px;
    text-align: center;
    font-size: 0.8em;
    opacity: 0.05;
    animation: moveUp linear infinite;
}
@keyframes moveUp {
    0% { top: 100%; }
    100% { top: -200%; }
}

/* --- CONTAINER --- */
.container {
    position: relative;
    z-index: 2;
    background: rgba(0,0,0,0.85);
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 600px;
    box-shadow: 0 0 20px #00ff00aa;
    text-align: left;
}

/* --- TERMINAL TEXT --- */
#terminal {
    white-space: pre-wrap;
    font-size: 1em;
    min-height: 200px;
    word-wrap: break-word;
}

.cursor {
    display: inline-block;
    width: 10px;
    background: #00ff00;
    animation: blink 1s step-start infinite;
}
@keyframes blink { 50% { background: transparent; } }

/* --- LOADING BAR --- */
.loading-bar {
    width: 100%;
    height: 15px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    margin: 15px 0;
    display: none;
}
.loading-bar-inner {
    height: 100%;
    width: 0%;
    background: #00ff00;
    border-radius: 10px;
}

/* --- BUTTON --- */
button {
    padding: 10px 18px;
    font-size: 1em;
    font-family: monospace;
    border: none;
    border-radius: 8px;
    background: #00ff00;
    color: #000;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
}
button:hover { transform: scale(1.05); background: #00cc77; }

/* --- CONFETTI --- */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: #00ff00;
    top: 0;
    animation: fall linear forwards;
}
@keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

/* --- RESPONSIVE --- */
@media (max-width: 500px) {
    #terminal { font-size: 0.9em; }
    button { padding: 8px 16px; font-size: 0.9em; }
}
</style>
</head>
<body>

<div id="bg"></div>

<div class="container">
  <div id="terminal"></div>
  <div class="loading-bar" id="loadingBar"><div class="loading-bar-inner" id="loadingInner"></div></div>
  <button id="startBtn">Access Terminal 🖥️</button>
</div>

<script>
// --- FULL SCREEN CODE BACKGROUND ---
const bg = document.getElementById('bg');
const sampleData = ["01010101","sudo init birthday","echo 🎉","access granted","Verifying user age...","💻 hacker mode","system online","cat /happy_birthday.txt","ls -la"];
const cols = Math.floor(window.innerWidth / 15); // ~1 column per 15px

for(let c=0;c<cols;c++){
    const col = document.createElement('div');
    col.classList.add('column');
    col.style.left = (c*15)+'px';
    col.style.animationDuration = (Math.random()*20 + 10)+'s';
    let text = "";
    for(let i=0;i<50;i++){
        text += sampleData[Math.floor(Math.random()*sampleData.length)] + "\n";
    }
    col.textContent = text;
    bg.appendChild(col);
}

// --- TERMINAL SCRIPT ---
const terminal = document.getElementById('terminal');
const startBtn = document.getElementById('startBtn');
const loadingBar = document.getElementById('loadingBar');
const loadingInner = document.getElementById('loadingInner');

const finalMessage = `Hi Granny! So… happy birthday! 🎉

Hope you like the site 😭 because I’m broke and this is the only thing I could actually make since it’s free. But hey effort was expensive 💅

Since you’re refusing to tell me your exact birthday, you’re getting either early wishes or perfectly on-time wishes… we’ll never know 😉

I hope this year brings you everything you want success, happiness, peace of mind, and all the good things you deserve (which is a lot, by the way).

Also… please don’t stress yourself too much. You’re already capable of getting anything you want, you just have to believe it a little more and maybe rest sometimes 😌

And just so you know
I’m always here for you. No pressure, no stress… just here. 🖤

Now about the site—
I didn’t know what vibe to go with, so I went with hacker vibes because obviously you’re secretly a hacker and just haven’t told me yet 💻

$ Access granted
$ Welcome, elite hacker 🖤`;

startBtn.onclick = () => {
    startBtn.style.display = 'none';
    terminal.textContent = "$ Initializing birthday system…\n";
    loadingBar.style.display = 'block';
    let width = 0;
    const interval = setInterval(() => {
        width++;
        loadingInner.style.width = width + '%';
        if(width >= 100){
            clearInterval(interval);
            loadingBar.style.display = 'none';
            typeText("$ Verifying user age… 🕵️‍♂️\n$ User status: Definitely getting older 😏\n\n", () => {
                setTimeout(() => { typeText(finalMessage, launchConfetti); }, 800);
            });
        }
    }, 30);
}

function typeText(text, callback){
    let i = 0;
    const cursor = '<span class="cursor"></span>';
    function typing(){
        if(i < text.length){
            terminal.innerHTML += text.charAt(i) === '\n' ? '\n' : text.charAt(i);
            i++;
            setTimeout(typing, 35);
        } else {
            terminal.innerHTML += cursor;
            if(callback) callback();
        }
    }
    typing();
}

// --- CONFETTI ---
function launchConfetti(){
    for(let i=0;i<80;i++){
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.left = Math.random()*100 + 'vw';
        confetti.style.animationDuration = (Math.random()*3+2)+'s';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 5000);
    }
}
</script>

</body>
</html>
